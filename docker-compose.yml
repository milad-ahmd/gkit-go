version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: gkit
      POSTGRES_PASSWORD: gkit
      POSTGRES_DB: gkit
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gkit"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── gkit example server ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"   # HTTP API + /metrics + /healthz
      - "50051:50051" # gRPC
    environment:
      # OpenTelemetry
      - OTEL_EXPORTER_OTLP_ENDPOINT=tempo:4317
      - OTEL_SERVICE_NAME=gkit-server
      # Database
      - DB_DSN=postgres://gkit:gkit@postgres:5432/gkit?sslmode=disable
      # Redis
      - REDIS_ADDR=redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      prometheus:
        condition: service_started
      tempo:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./.docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=1h
      - --web.enable-lifecycle

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - ./.docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./.docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - tempo

  # ── Grafana Tempo (distributed tracing) ───────────────────────────────────
  tempo:
    image: grafana/tempo:2.6.0
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./.docker/tempo.yml:/etc/tempo.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "3200:3200"   # Tempo query API

volumes:
  postgres-data:
  grafana-data:
